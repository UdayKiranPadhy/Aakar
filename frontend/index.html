<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231a73e8'/%3E%3Ctext x='8' y='11' font-family='monospace' font-size='10' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aakar — interactive visualizer for LLM architectures from HuggingFace." />
    <meta name="color-scheme" content="light dark" />
    <title>Aakar — LLM architecture visualizer</title>
    <!-- Resolve the theme before first paint to avoid a light→dark flash on
         reload. Reads the same localStorage key as the store (aakar.theme);
         falls back to the OS preference, then light. Kept tiny and dependency-free
         because it runs ahead of the module bundle. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("aakar.theme");
          var theme =
            pref === "light" || pref === "dark"
              ? pref
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Flex:wght@100..900&family=Google+Sans+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
