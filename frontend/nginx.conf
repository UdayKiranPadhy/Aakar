server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that isn't a real file resolves to index.html so
    # client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Vite already content-hashes filenames.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the HTML shell — that's the only file whose URL is stable.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip compression (brotli would be even better but requires the brotli module).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;
}
